name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest -q --cov=memory_firewall --cov-report=term-missing

      - name: Compile modules
        run: |
          python -m compileall -q src tests

  mypy:
    name: mypy (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run mypy
        run: |
          python -m mypy --python-version "${{ matrix.python-version }}" src/memory_firewall tests

  artifacts:
    name: package artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Build artifacts
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m build
          python -m twine check dist/*

      - name: Smoke installed wheel
        run: |
          python -m venv /tmp/memory-firewall-wheel-smoke
          /tmp/memory-firewall-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/memory-firewall-wheel-smoke/bin/pip install dist/*.whl
          /tmp/memory-firewall-wheel-smoke/bin/pip check
          /tmp/memory-firewall-wheel-smoke/bin/memory-firewall doctor --json
          /tmp/memory-firewall-wheel-smoke/bin/memory-firewall schema bundle
